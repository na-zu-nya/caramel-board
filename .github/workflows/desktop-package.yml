name: Desktop Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Package desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CI: 'true'
      TURBO_TELEMETRY_DISABLED: '1'
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run -w @caramelboard/desktop build:app

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: caramel-board-desktop-${{ runner.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.app
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          pattern: caramel-board-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find release-assets -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes
          fi
