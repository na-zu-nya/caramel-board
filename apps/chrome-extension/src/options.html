<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Caramel Board Clipper</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow" data-i18n="optionsEyebrow">Caramel Board</p>
          <h1 data-i18n="optionsHeading">Clipper</h1>
        </div>
        <button id="detectButton" class="ghost-button" type="button" data-i18n="detectButton">
          自動検出
        </button>
      </header>

      <section class="panel">
        <form id="settingsForm" class="form">
          <label class="field">
            <span data-i18n="apiBaseUrlLabel">API URL</span>
            <input id="apiBaseUrl" name="apiBaseUrl" type="url" required />
          </label>

          <label class="field">
            <span data-i18n="clipperApiKeyLabel">Clipper連携キー</span>
            <input
              id="clipperApiKey"
              name="clipperApiKey"
              type="password"
              autocomplete="off"
              placeholder="cb_clip_..."
              data-i18n-placeholder="clipperApiKeyPlaceholder"
            />
          </label>

          <div class="auth-grid">
            <label class="field">
              <span data-i18n="basicAuthUsernameLabel">Basic Auth ユーザー</span>
              <input id="basicAuthUsername" name="basicAuthUsername" autocomplete="username" />
            </label>
            <label class="field">
              <span data-i18n="basicAuthPasswordLabel">Basic Auth パスワード</span>
              <input
                id="basicAuthPassword"
                name="basicAuthPassword"
                type="password"
                autocomplete="current-password"
              />
            </label>
          </div>

          <div class="actions">
            <button class="primary-button" type="submit" data-i18n="saveButton">保存</button>
            <button
              id="testButton"
              class="secondary-button"
              type="button"
              data-i18n="testConnectionButton"
            >
              接続を確認
            </button>
            <button
              id="syncButton"
              class="secondary-button"
              type="button"
              data-i18n="syncLibrariesButton"
            >
              ライブラリ更新
            </button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2 data-i18n="librariesHeading">ライブラリ</h2>
          <span id="datasetCount" class="count">0</span>
        </div>
        <div id="datasets" class="datasets"></div>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
